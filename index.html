<!doctypehtml><html lang=zh-CN><head><meta charset=utf-8><meta content="width=device-width,initial-scale=1,viewport-fit=cover"name=viewport><title>Ash. — WebAssembly 原生移植</title><style>:root{color-scheme:dark;background:#050807;color:#cde8ce;font-family:ui-monospace,monospace}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at 50% 35%,#15251a,#050807 65%)}main{width:min(100vw,1120px);padding:18px;text-align:center}h1{margin:0 0 12px;font:500 15px/1.4 ui-monospace,monospace;letter-spacing:.12em;color:#89b991}.screen{position:relative;aspect-ratio:8/5;border:1px solid #547a5b;box-shadow:0 0 0 4px #0a110c,0 22px 80px #000;background:#000}canvas.emscripten{display:block;width:100%;height:100%;image-rendering:pixelated;outline:0}#status{margin-top:12px;min-height:1.4em;color:#739579;font-size:12px}progress{width:min(420px,80%);accent-color:#7daf84}.note{margin-top:5px;color:#526b57;font-size:11px}</style></head><body><main><h1>ASH. / NATIVE WEBASSEMBLY PORT</h1><div class=screen><canvas class=emscripten id=canvas oncontextmenu=event.preventDefault() tabindex=-1></canvas></div><div id=status>正在加载原始资源…</div><progress id=progress max=100 value=0></progress><div class=note>Enter / Space：开始、推进文字　F：全屏　Esc：退出</div></main><script>const statusElement=document.getElementById("status"),progressElement=document.getElementById("progress");var Module={canvas:document.getElementById("canvas"),setStatus(e){statusElement.textContent=e||"";const t=e&&e.match(/\((\d+)\/(\d+)\)/);t?(progressElement.hidden=!1,progressElement.value=Number(t[1]),progressElement.max=Number(t[2])):e||(progressElement.hidden=!0,statusElement.textContent="原生解码器运行中（真实移植代码）")},totalDependencies:0,monitorRunDependencies(e){this.totalDependencies=Math.max(this.totalDependencies,e),this.setStatus(e?`正在加载资源… (${this.totalDependencies-e}/${this.totalDependencies})`:"")},printErr(e){console.error(e)}};Module.setStatus("正在下载 WebAssembly…")</script><script async src=ash_port.js></script></body></html>
